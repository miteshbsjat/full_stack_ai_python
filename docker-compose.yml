version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    volumes:
      - ./backend:/app
      - ./ml_models:/ml_models:ro
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - FLASK_SECRET_KEY=dev
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/document_search
      - MODEL_API_URL=http://model_api:8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      model_api:
        condition: service_started

  model_api:
    build:
      context: ./model_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_CACHE_DIR=/app/model_cache
    volumes:
      - ./model_cache:/app/model_cache
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.document_processor worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./ml_models:/app/ml_models:ro
      - ./uploads:/app/uploads
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/document_search
      - MODEL_API_URL=http://model_api:8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      model_api:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=document_search
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

